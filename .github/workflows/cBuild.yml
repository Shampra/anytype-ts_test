name: Custom release

on:
  push:
    tags:
      - v*
    
  workflow_dispatch: 
    inputs:
      release_name:
        description: 'Nom de la release'
        required: true
        default: 'Test Release'
      prerelease:
        description: 'Version préliminaire?'
        required: false
        type: boolean
        default: true

permissions:
  contents: 'write'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Setup
        run: |
          git config --global url."https://${{secrets.USER}}:${{secrets.TOKEN}}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${{secrets.USER}}:${{secrets.TOKEN}}@api.github.com/".insteadOf "https://api.github.com/"

      - name: Install Go
        uses: actions/setup-go@v1
        with:
          go-version: 1.22

      - name: Setup GO
        run: |
          go version
          echo GOPATH=$(go env GOPATH) >> $GITHUB_ENV
          echo GOBIN=$(go env GOPATH)/bin >> $GITHUB_ENV
          echo $(go env GOPATH)/bin >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install AzureSignTool
        run: dotnet tool install --global AzureSignTool

      - name: Check out Git repository
        uses: actions/checkout@v1

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v1
        with:
          node-version: 20.9.0

      - name: Install Webpack
        run: npm install --save-dev webpack-cli --legacy-peer-deps

      - name: Update locale
        run: npm run update:locale
        env:
          GITHUB_TOKEN: ${{secrets.TOKEN}}

      - name: Update Addon 
        shell: bash
        run: |
          if [ ! -f middleware.version ] || [ ! -s middleware.version ]; then
            echo "❌ Error: middleware.version file is missing or empty"
            exit 1
          fi
          
          if [ -z "${{ secrets.USER }}" ] || [ -z "${{ secrets.TOKEN }}" ]; then
            echo "❌ Error: GitHub secrets USER or TOKEN are missing"
            exit 1
          fi
          
          echo "ℹ️ Running update-ci.sh with middleware version: $(cat middleware.version)"
          
          ./update-ci.sh --user="${{ secrets.USER }}" --token="${{ secrets.TOKEN }}" --os="windows-latest" --middleware-version="$(cat middleware.version)"

      - name: Build Native Messaging Host Windows
        run: npm run build:nmh-win
        env:
          CGO_ENABLED: 0

      - name: Make artifacts dir
        run: |
          mkdir -p artifacts

      - name: Cleanup artifacts Windows
        if: ${{ startsWith(matrix.os, 'windows-') }}
        run: |
          rm dist/anytypeHelper.exe
          rm dist/nativeMessagingHost.exe
          mv dist/*.exe artifacts

      - name: Release
        uses: softprops/action-gh-release@v0.1.14
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "artifacts/**"
        env:
          GITHUB_TOKEN: ${{secrets.TOKEN}}

      - name: debug Windows
        shell: pwsh
        run: |
          Get-ChildItem -Path dist | Format-Table -Property Mode, LastWriteTime, Length, Name
          Get-ChildItem -Path artifacts | Format-Table -Property Mode, LastWriteTime, Length, Name

      - name: Rename and Zip the executable
        run: |
          # Compresser le dossier Converter
          Compress-Archive -Path "artifacts" -DestinationPath "artifacts.zip"
          
      - name: Upload artifact for testing
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: artifacts.zip
